# --- totality (E2001, size-change termination) ---
check.totality.title=TOTALITY
check.totality.notstructural=Recursive helper `let {0}` is not structurally recursive: it passes no argument that is a strictly smaller part of a parameter. Recurse on a part obtained by `match` (a field or a case), count with `fold`, or mark the helper `partial`.
check.totality.sizechange=Recursive helpers {0} are mutually recursive but not size-change terminating: no argument strictly decreases around every recursive cycle. Recurse on a strictly smaller part obtained by `match` (a field or a case), or mark one of them `partial` to opt out.
check.totality.toocomplex=Recursion {0} is too complex to prove total by size-change analysis; mark one of them `partial` to opt out.

# --- invariant discharge (E2010 error, E2011 warning) ---
check.invariant.title=INVARIANT
check.invariant.violation=Constructing `{0}` here violates its invariant on a reachable path: the guards force a value the invariant rejects. Fix the value, or guard the path so the violating case cannot reach here.
check.invariant.unproven=Constructing `{0}` here may violate its invariant: the guards do not establish it. Guard it with `require`, or reify the relation into `{0}`'s (or an input's) invariant so it is assumed here.
check.invariant.reify=If a relation between inputs guarantees this, declare it as an `invariant` on the input data so it is checked once at its boundary and assumed here.

