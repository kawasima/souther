# Diagnostic message catalog — English base.
# A key missing from messages_ja.properties falls back here. Codes are the stable identity;
# titles/messages/hints are prose and may be localized. Keep {0}-style placeholders in sync
# across locales. Avoid a lone apostrophe in a message that takes arguments (MessageFormat).

# --- frame ---
diag.error.title=ERROR
diag.hint.label=Hint:
diag.diff.found=It is:
diag.diff.expected=But it needs to be:
diag.suggestion=did you mean `{0}`?

# --- error titles (spec section 22) ---
e1001.title=DIRECT CONSTRUCTION
e1002.title=INSUFFICIENT CONSTRUCTION AUTHORITY
e1004.title=SPREAD FIELD COLLISION
e1005.title=MISSING FIELD IN SPREAD
e1006.title=OVER-DECLARED CONSTRUCTION
e1101.title=INVARIANT TYPE MISMATCH
e1201.title=NON-EXHAUSTIVE MATCH
e1301.title=USE OF NULL
e1302.title=USE OF EXCEPTIONS
e1305.title=UNCREATABLE INJECTED DATA
e1401.title=ARBITRARY JAVA CALL
e1501.title=CYCLIC IMPORT
e1601.title=UNBOUND DEPENDENCY
e1602.title=MISSING REQUIRES
e1603.title=OVER-DECLARED REQUIRES
e1604.title=COMPOSITION OUTPUT MISMATCH
e1605.title=MISSING OUTPUT SIGNATURE
e1606.title=CROSS-MODULE COMPOSITION OUTPUT
e1701.title=COMPOSITION TYPE MISMATCH

# --- rewritten high-value messages (Elm-style: found/expected, secondary regions, hints) ---

# type mismatch (a value does not have the type its position requires)
check.type.mismatch.title=TYPE MISMATCH
check.type.mismatch.msg={0} does not have the type it needs here.
check.type.mismatch.hint=Adjust the value so its type matches, or change what this position expects.

# the two branches of an `if` disagree
check.if.title=TYPE MISMATCH
check.if.msg=The two branches of this `if` produce different types, so the `if` has no single type.
check.if.then=the `then` branch produces {0}
check.if.else=the `else` branch produces {0}
check.if.hint=Make both branches produce the same type — wrap one in the case you meant, or handle it upstream.

# non-exhaustive match (E1201)
e1201.msg=This `match` on {0} does not cover every case.
e1201.hint=Add a case for: {0}

# unknown names (with a did-you-mean suggestion)
check.unknown.title=NAMING ERROR
check.unknown.name.msg=I cannot find a value named `{0}` in scope.
check.unknown.type.msg=I cannot find a type named `{0}`.
check.unknown.behavior.msg=I cannot find a behavior named `{0}` in this pipeline.

# list elements disagree on type
check.list.title=TYPE MISMATCH
check.list.msg=The elements of this list do not all have the same type.
check.list.hint=One element is {0} and another is {1}; make every element the same type.

# binary / unary operand types
check.concat.title=TYPE MISMATCH
check.concat.msg=`++` joins two lists or two strings, but the operands are {0} and {1}.
check.compare.title=TYPE MISMATCH
check.compare.msg=These two values cannot be compared: {0} and {1}.
check.neg.title=TYPE MISMATCH
check.neg.msg=Unary minus needs an Int or a Decimal, but this is {0}.
check.operand=this is {0}

# behavior composition type mismatch (E1701)
e1701.msg=These behaviors cannot be composed: the left behavior's output is not accepted by the right behavior's input.
e1701.hint=Make the left output a case the right behavior accepts, or handle the extra cases before this stage.

# --- coded declaration errors ---

# construction authority (E1002 too few, E1006 too many)
e1002.msg=Behavior `{0}` constructs `{1}` but does not declare `constructs {1}`.
e1002.hint=Add `constructs {1}` to `{0}`, or stop constructing {1} here.
e1006.msg=Behavior `{0}` declares `constructs {1}` but never builds {1}; it passes an existing value through.
e1006.hint=Remove `{1}` from the `constructs` clause.

# requires (E1602 missing, E1603 extra)
e1602.msg=`let {0}` calls `{1}`, which has no implementation, but `behavior {2}` does not declare `requires {1}`.
e1602.hint=Add `requires {1}` to `behavior {2}`.
e1603.msg=`behavior {0}` declares `requires {1}`, but `let {2}` never calls it.
e1603.hint=Remove `{1}` from the `requires` clause.

# injected behavior constructs an uncreatable data (E1305)
e1305.msg=Injected behavior `{0}` declares `constructs {1}`, but {1} is neither a unit data nor exposed, so Java cannot build it.
e1305.hint=Expose {1}, or make it a unit data.

# composition output declaration vs inference (E1604) and output signature (E1605)
e1604.msg=behavior {0} declares its output as {1}, but the pipeline produces {2}.
e1604.hint=Update the declared output, or handle the extra case before the output.
e1605.notcomposition=`exposing` gives an output signature to `{0}`, which is not a composition (`>->`); only a composition needs one.
e1605.missing=Exposed composition `{0}` must declare its output in `exposing`.
e1605.missing.hint=Write `exposing ( {0} : {1} )`.
e1606.msg=The output union of `{0}` includes `{1}`, a case declared in another module.
e1606.hint=A generated result union permits only cases from its own module (a case class from an imported module cannot join it); consume `{1}` at the boundary, or re-express it as a local case.

# spread / field collisions (E1004) and missing spread field (E1005)
e1004.msg=Field `{0}` from `...{1}` conflicts with a field of `{2}`.
e1004.dup=Duplicate field `{0}` in `{1}`.
e1005.msg=Construction of `{0}` is missing field `{1}`.
e1005.hint=Supply `{1}` explicitly; the spread does not provide it.

# invariant type (E1101)
e1101.msg=An invariant expression must have type Bool, but this is {0}.

# arbitrary Java call (E1401) and stdlib qualifier
e1401.msg=`{0}` is not a behavior or a builtin.
e1401.hint=Declare a behavior without a `let` and implement it from Java; arbitrary JVM calls are not allowed.
check.stdlib.qualified.msg=`{0}` is a standard-library function and must be called qualified, as `{1}`.

# stdlib argument-type checks (expected container kind is a localized phrase)
kind.list=a List
kind.map=a Map
kind.set=a Set
kind.option=an Option
kind.ordered.list=a list of ordered values (Int, String, Decimal, Date, or DateTime)
check.expects=`{0}` expects {1}, but got {2}.
check.ordered=`{0}` needs {1}, but the element is {2}.
check.ordered.hint=Map to an ordered field first (e.g. `.value`), then sort or compare that.
check.ordered.key=`{0}`'s key must be an ordered value, but it returns {1}.

# duplicates
check.duplicate.title=DUPLICATE DEFINITION
check.dup.let=`let {0}` is already defined.
check.dup.data=data `{0}` is already defined.
check.dup.field=Field `{0}` is defined more than once.
check.dup.name=`{0}` is listed more than once in {1}.

# match
check.match.title=MATCH ERROR
check.match.notsum=`match` needs a sum-typed value, but got {0}.
check.match.notcase=`{0}` is not a case of {1}.
check.match.overlap=`{0}` is matched by more than one case.
check.match.nocases=This `match` has no cases.
check.match.option.orpattern=Or-patterns are not allowed in an Option match; use separate Some and None cases.
check.match.option.notcase=`{0}` is not a case of Option; use Some or None.

# tuple pattern / field access
check.tuple.pattern=A tuple pattern needs a tuple, but got {0}.
check.tuple.arity=This pattern binds {0} name(s), but the tuple has {1} element(s).
check.access=I cannot read a field `{0}` on this value.

# arity, block-as-value, construction
check.arity.title=WRONG NUMBER OF ARGUMENTS
check.arity=`{0}` takes {1} argument(s), but got {2}.
check.block.title=BLOCK IS NOT A VALUE
check.block.notvalue=A block is not a value: it may be passed as an argument or bound to a `let` and applied, but it cannot be returned or stored in a data.
check.construct.title=CANNOT CONSTRUCT
check.construct.self=data `{0}` cannot be constructed: it needs a value of itself through a mandatory field, with nothing to bottom out. Make the self-referring field optional (`?`) or a `List`.
check.construct.no=I cannot construct `{0}` here.

# a `let` implementing a `behavior` must match its contract
check.impl.title=IMPLEMENTATION MISMATCH
check.impl.noreturn=`let {0}` implements `behavior {1}`, so its return type comes from the behavior — do not declare one.
check.impl.arity=`let {0}` takes {1} parameter(s), but `behavior {2}` has {3} input(s) plus {4} requires-parameter(s).
check.impl.noannotate=`let {0}` implements `behavior {1}`, so its parameters take their types from it — do not annotate `{2}`.
check.impl.reqorder=`let {0}` parameter `{1}` should be `{2}`: the `requires` become the trailing parameters, in declared order.

# helper `let` declaration rules
check.helper.title=HELPER DECLARATION
check.helper.annotate=Helper `let {0}` must annotate parameter `{1}` with its type.
check.helper.infer=Helper `let {0}` parameter `{1}` cannot be inferred from its call sites; annotate it with its type.
check.helper.conflict=Helper `let {0}` parameter `{1}` is used at conflicting types ({2} and {3}); a helper is monomorphic — annotate it.
check.helper.fnparam=Helper `let {0}` parameter `{1}` receives a function; a function-typed parameter must be annotated with its type.
check.helper.return=Helper `let {0}` declares it returns {1}, but its body is {2}.
check.rechelper.return=Recursive helper `let {0}` must declare its return type (`let {0} (...) : <type> = ...`), because its result cannot be inferred through the recursion.
check.rechelper.fnparam=Recursive helper `let {0}` cannot take the function parameter `{1}` — a recursive helper is a method, and a function cannot be passed to it.
check.rechelper.pure=Recursive helper `let {0}` is pure and cannot call the injected behavior `{1}` — put the effect in the behavior that calls this helper.
check.invariant.title=INVALID INVARIANT
check.invariant.recursive=The invariant of `{0}` calls the recursive helper `{1}`, but an invariant is checked at construction time and must terminate.

# module / exposing
check.module.title=MODULE ERROR
check.exposing.granular=`exposing` is type-granular: a data's `decoder`/`encoder` are always public once the data is exposed. Write `{0}`, not `{1}`.
check.exposing.imported=`exposing` names `{0}`, which is imported into this module, not defined here; `exposing` lists a module's own definitions and does not re-export imported names.
check.exposing.notdefined=`exposing` names `{0}`, which is not a data or behavior of this module.
check.inject.requires=behavior `{0}` has no `let`, so it is an injection target; it cannot declare `requires` — the behavior that calls or composes it does.

# a type that must not cross the decoder/encoder boundary
check.boundary.title=BOUNDARY TYPE
check.param.union=parameter `{0}` has an anonymous union type `{1}`; a parameter type must be a single named type — declare `data ... = {1}` and take that name.
check.param.tuple=parameter `{0}` is a tuple; a tuple has no external representation and cannot cross the boundary, so a behavior's input must be a named data.
check.output.tuple=behavior `{0}` outputs a tuple; a tuple cannot cross the boundary, so a behavior's output must be a named data or a sum of them.

# missing type argument on a collection type
check.typearg.title=MISSING TYPE ARGUMENT
check.typearg.list=`List` needs a type argument, e.g. `List<Int>`.
check.typearg.set=`Set` needs a type argument, e.g. `Set<String>`.
check.typearg.option=`Option` needs a type argument.
check.typearg.map=`Map` needs a value type, e.g. `Map<String, Int>`.
check.map.key=A Map key must be String or a String-backed newtype (`data X = String`), but got {0}.

# comparison / arithmetic operands
check.compare.ordered=The two operands of a comparison must be ordered values of the same type (Int, String, Decimal, Date, or DateTime), but got {0} and {1}.
check.arith.operand=An arithmetic operand must be Int or Decimal, but got {0}.

# sum definition and derived decoder/encoder (codec)
check.sum.title=SUM DEFINITION
check.codec.title=CODEC
check.sum.unknowncase=Unknown case `{0}` in sum `{1}`.
check.sum.optioncase=`{0}` is a built-in Option case and cannot be declared as a data type.
check.codec.notcase=`{0}` is not a case of `{1}`.
check.codec.needdecoder=Case `{0}` needs a decoder.
check.codec.needencoder=Case `{0}` needs an encoder.
check.codec.missingcase=The encoder for `{0}` is missing case `{1}`.
check.spread.notproduct=Cannot spread `...{0}` — it is not a product data.
check.codec.iso=An ISO text encoder expects a Date or DateTime, but got {0}.
check.codec.option=An optional encoder expects an Option, but got {0}.
check.codec.noencoder=`{0}` has no encoder, so `{0}.encode` cannot be called.
check.codec.listsource=A `list(...)` encoder source must be a List, but got {0}.
check.codec.setsource=A set encoder source must be a Set, but got {0}.
check.codec.mapsource=A map encoder source must be a Map, but got {0}.
check.codec.nodecoder=`{0}` has no decoder, so `{0}.decoder` cannot be called.
check.codec.mustconstruct=The decoder for `{0}` must construct `{0}`, but constructs `{1}`.
check.construct.nofield=`{0}` is not a field of `{1}`.
check.field.type=Field `{0}` expects {1}, but got {2}.
check.spread.notdata=A spread `..{0}` must be a data value.

# pipeline / reserved names / numeric
check.pipe.title=PIPELINE
check.pipe.multiinput=`{0}` takes {1} inputs, so it cannot follow `>->` in `{2}`. Every stage after the first takes one input: call it inline, or open the branches with `match`. Only the first stage may take several.
check.pipe.boundary=decode/encode are boundary edges, not pipeline stages; `>->` composes behaviors only.
check.pipe.selfcompose=Pipeline `{0}` composes with itself (a cycle).
check.reserved.title=RESERVED NAME
check.builtin.shadow=`{0}` is a built-in value and cannot be used as a binding name — it would shadow the built-in; choose another name.
check.divide.rounding=The rounding mode of `divide` must be one of HALF_UP, HALF_EVEN, HALF_DOWN, UP, DOWN, CEILING, FLOOR.
check.union.members=Union members must be data types.
check.arith.expects=`{0}` expects Int or Decimal, but got {1}.

# first-class functions and function-typed helper parameters
check.fn.title=FUNCTION
check.fn.blockparam.arity=The block passed to `{0}` of `let {1}` takes {2} argument(s), but is written with {3}.
check.fn.blockparam.return=The block passed to `{0}` of `let {1}` must return {2}, but returns {3}.
check.fn.notfunction=`{0}` of `let {1}` expects a function, but `{2}` is a value, not a function.
check.fn.callarity=`{0}` calls its function with {1} argument(s), but the function takes {2}.
check.fn.argtype=`{0}`'s element type {1} is not acceptable to the function, which takes {2}.
check.fn.expectsblock=`{0}` expects a block, e.g. `{0}((acc, x) -> ..., seed, xs)`.
