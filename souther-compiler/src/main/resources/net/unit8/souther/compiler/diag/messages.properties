# --- syntax errors (lexer / parser) ---
parse.title=SYNTAX ERROR
parse.expected=I expected {0} here, but found {1}.
tok.name=a name
tok.integer=an integer
tok.decimal=a decimal
tok.string=a string
tok.typevar=a type variable
tok.eof=the end of input
lex.typevar=A type variable needs a name after `'`, e.g. `'a`.
lex.decimal.m=A fractional literal is a Decimal and needs the `m` suffix (write `{0}m`); Souther has no floating-point type.
lex.string.unterminated=This string literal is not closed before the end of the line.
lex.spread=A spread is written `...` (three dots).
lex.unexpected=Unexpected character `{0}`.
parse.module=A source file starts with a `module` declaration (or omit it in a single file).
parse.topdef=A top-level definition starts with `data`, `behavior`, or `let`.
parse.behavior.colon=A behavior signature uses `:` before its parameters: `behavior {0} : (...) -> ...`.
parse.intrinsic.rettype=Intrinsic `{0}` must declare its return type: `let {0} (...) : <type> = intrinsic "<key>"`.
parse.data.equals=data `{0}` needs `=` before its body: write `data {0} = ...`.
parse.data.fields=data `{0}` must declare at least one field or spread.
parse.tuple=A tuple type needs at least two elements; `(T)` is not a type.
parse.typevar.core=A type variable `{0}` is only allowed in the core (the reserved `souther` namespace); a user model stays bounded.
parse.vpipe.right=The right side of `|>` must be a function call or a function name.
parse.expr=I expected an expression here.
parse.orpattern=An or-pattern binds the sum type and cannot destructure a case's fields.
parse.option.positional=Option's wrapped value is bound positionally: write `| Some v`, not `| Some as v`.

