# --- 構文エラー（レキサ／パーサ） ---
parse.title=構文エラー
parse.expected=ここでは {0} を期待しましたが、{1} が見つかりました。
tok.name=名前
tok.integer=整数
tok.decimal=小数
tok.string=文字列
tok.typevar=型変数
tok.eof=入力の終わり
lex.typevar=型変数には `'` の後ろに名前が必要です（例: `'a`）。
lex.decimal.m=小数リテラルは Decimal です。`m` を付けてください（例: `{0}m`）。Souther に浮動小数点型はありません。
lex.string.unterminated=この文字列リテラルが行末までに閉じられていません。
lex.spread=スプレッドは `...`（ドット3つ）と書きます。
lex.unexpected=予期しない文字 `{0}` です。
parse.module=ソースファイルは `module` 宣言から始めます（単一ファイルなら省略できます）。
parse.topdef=トップレベルの定義は `data`・`behavior`・`let` のいずれかで始めます。
parse.behavior.colon=behavior のシグネチャは引数の前に `:` を書きます: `behavior {0} : (...) -> ...`
parse.intrinsic.rettype=intrinsic `{0}` は戻り値の型を宣言する必要があります: `let {0} (...) : <型> = intrinsic "<キー>"`
parse.data.equals=data `{0}` は本体の前に `=` が必要です。`data {0} = ...` と書きます。
parse.data.fields=data `{0}` は少なくとも1つのフィールドかスプレッドを宣言する必要があります。
parse.tuple=タプル型は要素が2つ以上必要です。`(T)` は型ではありません。
parse.typevar.core=型変数 `{0}` は core（予約された `souther` 名前空間）でのみ使えます。ユーザーのモデルは有界のままです。
parse.vpipe.right=`|>` の右辺は関数呼び出しか関数名でなければなりません。
parse.expr=ここには式が必要です。
parse.orpattern=or パターンは直和型を束縛するため、ケースのフィールドを分解できません。
parse.option.positional=Option の中身は位置で束縛します。`| Some as v` ではなく `| Some v` と書きます。

