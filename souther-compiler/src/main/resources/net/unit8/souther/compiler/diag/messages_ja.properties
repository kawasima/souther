# --- totality (E2001, サイズ変化停止性) ---
check.totality.title=TOTALITY
check.totality.notstructural=再帰ヘルパ `let {0}` は構造的再帰ではありません。パラメータの真に小さい部分を引数に渡していません。`match`（フィールドやケース）で取り出した部分に再帰するか、`fold` で数え上げるか、`partial` を付けてください。
check.totality.sizechange=再帰ヘルパ {0} は相互再帰ですが、サイズ変化停止性を満たしません。どの再帰サイクルでも真に減少する引数がありません。`match`（フィールドやケース）で取り出した真に小さい部分に再帰するか、どれかに `partial` を付けてください。
check.totality.toocomplex=再帰 {0} はサイズ変化解析で全域性を証明するには複雑すぎます。どれかに `partial` を付けてください。

# --- invariant discharge (E2010 error, E2011 warning) ---
check.invariant.title=INVARIANT
check.invariant.violation=ここでの `{0}` の構築は、到達可能な経路で不変条件に違反します。ガードが不変条件の拒む値を強制しています。値を直すか、違反ケースがここに届かないよう経路をガードしてください。
check.invariant.unproven=ここでの `{0}` の構築は不変条件に違反する可能性があります。ガードが不変条件を確立していません。`require` でガードするか、関係を `{0}`（または入力）の `invariant` に宣言してここで仮定させてください。
check.invariant.reify=入力間の関係がこれを保証するなら、入力データの `invariant` として宣言してください。境界で一度検査され、ここでは仮定されます。

